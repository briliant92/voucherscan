<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Barcode Scanner Live</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <style>
    body { background-color: #121212; color: white; font-family: sans-serif; }
    #interactive.viewport { width: 100%; height: 300px; overflow: hidden; position: relative; border-radius: 12px; border: 3px solid #ffc107; }
    #interactive.viewport > video { width: 100%; height: 100%; object-fit: cover; }
    canvas.drawingBuffer { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
  </style>
</head>
<body class="p-3">

<div class="container" style="max-width: 500px;">
  <div class="text-center my-3">
    <h4 class="fw-bold text-warning">📷 Live Barcode Scanner</h4>
    <p class="text-muted small">Posisikan garis barcode kamera tepat di tengah kotak</p>
  </div>

  <div id="interactive" class="viewport mb-3"></div>

  <div id="statusAlert" class="alert alert-info text-center d-none">Mencari Barcode...</div>
  
  <div class="card bg-secondary text-white p-3 mb-3">
    <label class="small text-light">Hasil Scan Terakhir:</label>
    <h3 id="scanResult" class="text-center my-2 fw-bold">-</h3>
  </div>
  
  <button onclick="window.close()" class="btn btn-outline-light w-100">Tutup Scanner</button>
</div>

<script>
  // PENTING: Masukkan URL Web App Google Script Anda (Gunakan link berakhiran /exec)
  const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyYiUnsFIYVkEZyvSv0mgd0Tr9u_ksNIU7nzTnlwHqc_v4TUZr5Gzu_D-vtK9-KndONqA/exec";

  window.onload = function() {
    Quagga.init({
      inputStream: {
        name: "Live",
        type: "LiveStream",
        target: document.querySelector('#interactive'),
        constraints: { facingMode: "environment" }
      },
      decoder: { readers: ["code_128_reader"] }
    }, function(err) {
      if (err) { alert("Gagal memuat kamera: " + err); return; }
      Quagga.start();
    });

    Quagga.onDetected(function(data) {
      let code = data.codeResult.code;
      if (code && code.includes("VCHR-")) {
        Quagga.stop(); // Hentikan kamera sementara
        
        let alertBox = document.getElementById('statusAlert');
        document.getElementById('scanResult').innerText = code;
        
        alertBox.classList.remove('d-none', 'alert-info', 'alert-success', 'alert-danger');
        alertBox.classList.add('alert-warning');
        alertBox.innerText = "⏳ Memverifikasi aturan voucher di Google Sheets...";

        // Tembak data ke Google Script
        fetch(`${GOOGLE_WEBAPP_URL}?scanCode=${encodeURIComponent(code)}`)
        .then(response => response.text()) // Baca sebagai text murni untuk bypass CORS
        .then(textData => {
          // Konversi manual text dari Google menjadi Object JSON
          let res = JSON.parse(textData);
          
          alertBox.classList.remove('alert-warning');
          alertBox.classList.add(res.success ? 'alert-success' : 'alert-danger');
          
          // Menampilkan pesan live dari aturan database (Sukses / Expired / Sudah Terpakai)
          alertBox.innerHTML = res.msg;

          // Kamera aktif kembali setelah 4 detik
          setTimeout(() => {
            alertBox.classList.add('d-none');
            Quagga.start();
          }, 4000);
        })
        .catch(err => {
          alertBox.classList.remove('alert-warning');
          alertBox.classList.add('alert-danger');
          alertBox.innerText = "⚠️ Gangguan Koneksi: Gagal merespons data dari Google.";
          setTimeout(() => { Quagga.start(); }, 3000);
        });
      }
    });
  };
</script>
</body>
</html>
