<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Barcode Scanner Live</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <style>
    body { background-color: #121212; color: white; font-family: sans-serif; }
    #interactive.viewport { width: 100%; height: 300px; overflow: hidden; position: relative; border-radius: 12px; border: 3px solid #ffc107; }
    #interactive.viewport > video { width: 100%; height: 100%; object-fit: cover; }
    canvas.drawingBuffer { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
  </style>
</head>
<body class="p-3">

<div class="container" style="max-width: 500px;">
  <div class="text-center my-3">
    <h4 class="fw-bold text-warning">📷 Live Barcode Scanner</h4>
    <p class="text-muted small">Posisikan garis barcode kamera tepat di tengah kotak</p>
  </div>

  <div id="interactive" class="viewport mb-3"></div>

  <div id="statusAlert" class="alert alert-info text-center d-none">Mencari Barcode...</div>
  
  <div class="card bg-secondary text-white p-3 mb-3">
    <label class="small text-light">Hasil Scan Terakhir:</label>
    <h3 id="scanResult" class="text-center my-2 fw-bold">-</h3>
  </div>
  
  <button onclick="window.close()" class="btn btn-outline-light w-100">Tutup Scanner</button>
</div>

<script>
  // PENTING: Ganti URL di bawah ini dengan URL Web App Google Script Anda yang berakhiran /exec
  const GOOGLE_WEBAPP_URL = "ISI_DENGAN_URL_WEB_APP_ANDA_DISINI";

  // Inisialisasi Detektor Kamera Barcode
  window.onload = function() {
    Quagga.init({
      inputStream: {
        name: "Live",
        type: "LiveStream",
        target: document.querySelector('#interactive'),
        constraints: {
          facingMode: "environment" // Paksa pakai kamera belakang HP
        },
      },
      decoder: {
        readers: ["code_128_reader"] // Format kode barcode generator kita
      }
    }, function(err) {
      if (err) {
        alert("Gagal memuat kamera: " + err);
        return;
      }
      Quagga.start();
    });

    // Aksi ketika barcode terdeteksi kamera
    Quagga.onDetected(function(data) {
      let code = data.codeResult.code;
      if (code && code.includes("VCHR-")) { // Validasi awal kode voucher
        Quagga.stop(); // Hentikan kamera sementara agar tidak mendobel kirim data
        
        let alertBox = document.getElementById('statusAlert');
        document.getElementById('scanResult').innerText = code;
        alertBox.classList.remove('d-none', 'alert-info', 'alert-success', 'alert-danger');
        alertBox.classList.add('alert-warning');
        alertBox.innerText = "Mengirim data ke Google Sheets...";

        // Otomatis menembakkan kode ke backend Google Sheets Anda (Autofill & Auto-Redeem)
        fetch(GOOGLE_WEBAPP_URL, {
          method: "POST",
          mode: "no-cors", // Mengatasi proteksi pembatasan lintas domain browser
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: code })
        })
        .then(() => {
          alertBox.classList.remove('alert-warning');
          alertBox.classList.add('alert-success');
          alertBox.innerHTML = `🎉 Sukses! Kode <b>${code}</b> telah diredeem.`;
          
          // Nyalakan kembali kamera setelah jeda 3 detik untuk scan voucher selanjutnya
          setTimeout(() => { 
            alertBox.classList.add('d-none'); 
            Quagga.start(); 
          }, 3000);
        })
        .catch(err => {
          alert("Gagal memproses data: " + err);
          Quagga.start();
        });
      }
    });
  };
</script>
</body>
</html>
